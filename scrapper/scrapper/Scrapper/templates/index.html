{% extends "base.html" %}

{% block content %}

<div class="search-box">
    <form action="/" method="POST">
        <input type="text" name="content" placeholder="Search for a product..." required>
        <button type="submit">Search</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>

{% endblock %}
